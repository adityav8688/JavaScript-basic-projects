<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./style.css">

    <title>Calculator</title>
</head>

<body>
    <header>
        <nav>
            <h1>Calculator</h1>
        </nav>
    </header>
    <main>
        <div class="calculator">
            <input type="text" id="display" disabled/>
            <input type="text" id="result" disabled />

            <div class="buttons">
                <button class="clearBtn" onclick="clearDisplay()"><span>C</span></button>
                <button onClick="backspace()"><span>⌫</span></button>
                <button onclick="appendValue('/')"><span>/</span></button>
                <button onclick="appendValue('7')"><span>7</span></button>
                <button onclick="appendValue('8')"><span>8</span></button>
                <button onclick="appendValue('9')"><span>9</span></button>
                <button onclick="appendValue('*')"><span>x</span></button>

                <button onclick="appendValue('4')"><span>4</span></button>
                <button onclick="appendValue('5')"><span>5</span></button>
                <button onclick="appendValue('6')"><span>6</span></button>
                <button onclick="appendValue('-')"><span>-</span></button>

                <button onclick="appendValue('1')"><span>1</span></button>
                <button onclick="appendValue('2')"><span>2</span></button>
                <button onclick="appendValue('3')"><span>3</span></button>
                <button class="addBtn" onclick="appendValue('+')"><span>+</span></button>
                <button onclick="appendValue('.')"><span>.</span></button>
                <button onclick="appendValue('0')"><span>0</span></button>
                <button onclick="calculate()"><span>=</span></button>

            </div>
        </div>
    </main>
    <script src="./script.js"></script>
</body>

</html>
