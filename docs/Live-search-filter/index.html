<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./style.css">
    <title>Live Search Filter</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
    <header>
        <nav>
            <div class="nav">
                <a href="../index.html"><span class="material-symbols-outlined">arrow_back</span></a>
                <h2>Live Search Filter</h2>
                <input type="text" id="searchBar" placeholder="Search items..." />
            </div>
        </nav>
    </header>
    <main>
        <div class="container">
            <div class="item-adder">
                <input type="text" id="itemInput" placeholder="Enter the item" />
                <button id="addBtn"><span class="material-symbols-outlined">add</span></button>
            </div>
            <div class="items">
                <ul id="itemsList"></ul>
            </div>
        </div>
    </main>
    <script src="./script.js"></script>
</body>

</html>
