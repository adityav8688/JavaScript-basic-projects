<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./style.css">
    <title>Live Search Filter</title>
</head>

<body>
    <header>
        <nav>
            <h2>Live Search Filter</h2>
            <input type="text" id="searchBar" placeholder="Search items..." />
        </nav>
    </header>
    <main>
        <div class="container">
            <div>
                <input type="text" id="itemInput" placeholder="Enter the item" />
                <button id="addBtn">Add</button>
            </div>
            <div>
                <ul id="itemsList"></ul>
            </div>
        </div>
    </main>
    <script src="./script.js"></script>
</body>

</html>
